version: '3.8'

services:
  db:
    image: postgres:15
    container_name: remont24_db
    environment:
      POSTGRES_DB: remont24_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: remont24_web
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: remont24_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    working_dir: /app
    command: python main.py

volumes:
  postgres_data: